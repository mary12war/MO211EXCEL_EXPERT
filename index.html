<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=site/">
  <link rel="canonical" href="site/">
  <title>Redirecting to Excel Expert Learning Site</title>
  <style>
    :root {
      color-scheme: dark;
    }
    html, body {
      height: 100%;
      margin: 0;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.25rem;
      box-sizing: border-box;
      padding: 1.5rem;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: radial-gradient(120% 100% at 50% 0%, #161b22 0%, #0d1117 45%, #010409 100%);
      color: #c9d1d9;
    }
    .loader {
      width: 2.5rem;
      height: 2.5rem;
      border: 3px solid rgba(240, 246, 252, 0.12);
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .label {
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: #8b949e;
    }
    .fallback {
      margin: 0;
      font-size: 0.8125rem;
      color: #6e7681;
    }
    .fallback a {
      color: #58a6ff;
      text-decoration: none;
    }
    .fallback a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="loader" role="status" aria-label="Loading"></div>
  <span class="label">Loading site…</span>
  <p class="fallback">If you are not redirected, <a href="site/">open the learning site</a>.</p>
</body>
</html>
